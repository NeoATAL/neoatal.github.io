<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Adem Tolunay Anadolu Lisesi · ECMWF IFS Forecast</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1"></script>
  <style>
    :root{
      --bg1:#0b1220; --bg2:#06111a;
      --aur1:#1de5ff; --aur2:#8cffcb; --aur3:#b388ff;
      --muted:#9fb0c4; --txt:#e9f3ff;
    }
    *{box-sizing:border-box}
    body{
      margin:0; font-family:Inter,system-ui,Arial;
      color:var(--txt);
      background:
        radial-gradient(1200px 800px at 15% 0%, rgba(29,229,255,.2), transparent 60%),
        radial-gradient(900px 700px at 85% 10%, rgba(140,255,203,.15), transparent 60%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
    }
    .wrap{max-width:1100px;margin:0 auto;padding:20px;
      display:grid;grid-template-columns:360px 1fr;gap:18px}
    header{grid-column:1/-1;display:flex;justify-content:space-between;align-items:center}
    .brand{display:flex;gap:10px;align-items:center}
    .logo{width:36px;height:36px;border-radius:10px;
      background:conic-gradient(from 200deg,var(--aur1),var(--aur2),var(--aur3));
      box-shadow:0 0 30px rgba(121,246,233,.5)}
    .title{font-weight:800;letter-spacing:.2px}
    .muted{color:var(--muted);font-size:14px}
    .controls select{
      background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
      color:inherit;padding:8px 10px;border-radius:10px;cursor:pointer
    }
    .card{background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:16px;
      box-shadow:0 10px 30px rgba(0,0,0,.35)}
    .temp{font-size:52px;font-weight:800;margin:8px 0}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .kv{display:flex;gap:8px;align-items:center;background:rgba(255,255,255,.05);
      border-radius:10px;padding:8px}
    .k{color:var(--muted);font-size:12px}.v{font-weight:800}
    .hstrip{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;margin-top:8px}
    .hour{min-width:95px;background:rgba(255,255,255,.05);padding:8px;
      border-radius:10px;text-align:center}
    .day{display:flex;justify-content:space-between;align-items:center;
      background:rgba(255,255,255,.05);padding:10px;border-radius:10px;margin-top:6px;cursor:pointer}
    .day:hover{background:rgba(255,255,255,.1)}
    .charts{display:flex;flex-direction:column;gap:10px}
    .charts select{align-self:flex-start}
    .charts canvas{background:rgba(255,255,255,.03);border-radius:10px}
    footer{grid-column:1/-1;text-align:center;color:var(--muted);font-size:12px;margin-top:4px}
    @media (max-width:980px){.wrap{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="brand">
        <div class="logo"></div>
        <div>
          <div class="title">Adem Tolunay Anadolu Lisesi — ECMWF IFS Forecast</div>
          <div class="muted">Meltem Mah., Antalya · Güncel tahmin</div>
        </div>
      </div>
    </header>

    <section class="card">
      <div class="muted" id="meta">Yükleniyor…</div>
      <div class="temp" id="cur-temp">--°</div>
      <div class="grid2">
        <div class="kv"><span>🌡️</span><div><div class="k">Hissedilen</div><div class="v" id="cur-feels">—</div></div></div>
        <div class="kv"><span>💧</span><div><div class="k">Nem</div><div class="v" id="cur-rh">—</div></div></div>
        <div class="kv"><span>💨</span><div><div class="k">Rüzgâr</div><div class="v" id="cur-wind">—</div></div></div>
        <div class="kv"><span>🧭</span><div><div class="k">Basınç</div><div class="v" id="cur-press">—</div></div></div>
        <div class="kv"><span>🌧️</span><div><div class="k">Yağış</div><div class="v" id="cur-precip">—</div></div></div>
      </div>

      <div class="muted" style="margin-top:8px">📅 Günlük (7 gün)</div>
      <div id="daily"></div>

      <div class="muted" style="margin-top:8px">🕒 Seçili Gün Saatlik</div>
      <div class="hstrip" id="hourly"></div>
    </section>

    <section class="card charts">
      <select id="series">
        <option value="temp">🌡️ Sıcaklık</option>
        <option value="precip">🌧️ Yağış</option>
        <option value="wind">💨 Rüzgâr</option>
        <option value="humidity">💧 Nem</option>
        <option value="pressure">🔽 Basınç</option>
      </select>
      <canvas id="chart" height="180"></canvas>
    </section>

    <footer>Kaynak: Open-Meteo ECMWF IFS API</footer>
  </div>

<script>
const LAT=36.89083,LON=30.67111;
const API=`https://api.open-meteo.com/v1/ecmwf?latitude=${LAT}&longitude=${LON}&timezone=auto`
 +`&hourly=temperature_2m,apparent_temperature,relative_humidity_2m,pressure_msl,wind_speed_10m,precipitation`
 +`&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,wind_speed_10m_max&forecast_days=7`;

let STATE={data:null,series:'temp',chart:null,selectedDay:0};
const fmt=(iso,o={})=>new Date(iso).toLocaleString('tr-TR',o);

async function loadData(){
  const r=await fetch(API); const j=await r.json(); STATE.data=j;
  renderAll();
}

function renderAll(){
  renderCurrent();
  renderDaily();
  renderHourly();
  drawChart();
}

function renderCurrent(){
  const h=STATE.data.hourly;
  const cur={
    temperature:h.temperature_2m[0],
    feels:h.apparent_temperature[0],
    humidity:h.relative_humidity_2m[0],
    wind:h.wind_speed_10m[0],
    pressure:h.pressure_msl[0],
    precip:h.precipitation[0]
  };
  document.getElementById('meta').textContent=`${fmt(h.time[0],{weekday:'long',day:'2-digit',month:'short',hour:'2-digit'})}`;
  document.getElementById('cur-temp').textContent=`${cur.temperature.toFixed(1)}°`;
  document.getElementById('cur-feels').textContent=`${cur.feels.toFixed(1)}°`;
  document.getElementById('cur-rh').textContent=`${cur.humidity}%`;
  document.getElementById('cur-wind').textContent=`${cur.wind.toFixed(1)} km/h`;
  document.getElementById('cur-press').textContent=`${cur.pressure.toFixed(0)} hPa`;
  document.getElementById('cur-precip').textContent=`${cur.precip.toFixed(1)} mm`;
}

function renderDaily(){
  const d=STATE.data.daily; const box=document.getElementById('daily'); box.innerHTML='';
  for(let i=0;i<d.time.length;i++){
    const row=document.createElement('div'); row.className='day';
    row.innerHTML=`<div><strong>${fmt(d.time[i],{weekday:'short',day:'2-digit'})}</strong></div>
      <div>${Math.round(d.temperature_2m_min[i])}° / <strong>${Math.round(d.temperature_2m_max[i])}°</strong> · <span class="muted">${d.precipitation_sum[i]} mm</span></div>`;
    row.onclick=()=>{STATE.selectedDay=i;renderHourly();};
    box.appendChild(row);
  }
}

function renderHourly(){
  const h=STATE.data.hourly; const hs=document.getElementById('hourly'); hs.innerHTML='';
  const day=STATE.data.daily.time[STATE.selectedDay];
  for(let i=0;i<h.time.length;i++){
    if(h.time[i].startsWith(day)){
      const el=document.createElement('div'); el.className='hour';
      el.innerHTML=`<div class="muted">${fmt(h.time[i],{hour:'2-digit'})}</div>
        <div style="font-weight:800;font-size:18px">${h.temperature_2m[i].toFixed(0)}°</div>
        <div class="muted" style="font-size:12px">${h.precipitation[i].toFixed(1)} mm</div>`;
      hs.appendChild(el);
    }
  }
}

function drawChart(){
  const h=STATE.data.hourly; const labs=h.time.slice(0,48).map(t=>fmt(t,{day:'2-digit',hour:'2-digit'}));
  let data,label;
  switch(STATE.series){
    case 'temp': data=h.temperature_2m.slice(0,48); label='Sıcaklık (°C)'; break;
    case 'precip': data=h.precipitation.slice(0,48); label='Yağış (mm)'; break;
    case 'wind': data=h.wind_speed_10m.slice(0,48); label='Rüzgar (km/h)'; break;
    case 'humidity': data=h.relative_humidity_2m.slice(0,48); label='Nem (%)'; break;
    case 'pressure': data=h.pressure_msl.slice(0,48); label='Basınç (hPa)'; break;
  }
  if(STATE.chart) STATE.chart.destroy();
  STATE.chart=new Chart(document.getElementById('chart'),
    {type:(STATE.series==='precip'?'bar':'line'),
     data:{labels:labs,datasets:[{label,data, borderColor:'#8cffcb', backgroundColor:'rgba(121,246,233,.6)', tension:.25, pointRadius:0}]},
     options:{plugins:{legend:{labels:{color:'#dfe9ff'}}},scales:{x:{ticks:{color:'#aac1da'}},y:{ticks:{color:'#aac1da'}}}}});
}

document.getElementById('series').addEventListener('change',e=>{STATE.series=e.target.value;drawChart();});
loadData();
</script>
</body>
</html>
